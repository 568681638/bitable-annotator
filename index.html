<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多维表格标注器</title>
  <script type="module" crossorigin src="./assets/index.f8ebb5ae.js"></script>

</head>
<body>
  <div id="app">
    <div class="header">
      <h3>多维表格标注器</h3>
      <div class="nav-controls">
        <button id="prevBtn" class="nav-btn" disabled>上一条</button>
        <span id="recordIndex" class="index-display">0 / 0</span>

    </div>
  </div>
