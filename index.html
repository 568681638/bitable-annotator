<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多维表格标注器</title>
</head>
<body>
  <div id="app">
    <div class="header">
      <h3>多维表格标注器</h3>
      <button id="refreshBtn" class="refresh-btn" title="刷新视图记录列表">↻</button>
      <div class="nav-controls">
        <button id="prevBtn" class="nav-btn" disabled>上一条</button>
        <span id="recordIndex" class="index-display">0 / 0</span>
        <button id="nextBtn" class="nav-btn" disabled>下一条</button>
        <button id="locateBtn" class="nav-btn locate-btn" disabled title="定位到表格">📍</button>
      </div>
    </div>
    <div id="recordContent" class="content">
      <div class="loading">加载中...</div>
    </div>
    <div class="footer">
      <button id="undoBtn" class="undo-btn" disabled>撤销</button>
      <button id="saveBtn" class="save-btn" disabled>保存</button>
    </div>
  </div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
